<!DOCTYPE html>
<html lang="en">
<head>

  <title>Project Vindex Dashboard</title>

  <link rel="stylesheet" href="./style.css?v=23000" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<body>
  <main class="dash-page">
    <div class="dash-overlay"></div>

    <section class="dash-hero">
      <div class="pv-mark">⚔</div>
      <h1>Project Vindex</h1>
      <p class="latin">Vox Dei</p>
    </section>

    <section class="dash-actions">
      <button class="dash-card" onclick="window.location.href='guidebook.html?v=23000'">
        <div class="card-icon">📖</div>
        <span>Pro Se<br />Guidebook</span>
        <small>Doctrine. Discipline. Record control.</small>
        <b>→</b>
      </button>

      <button class="dash-card" onclick="window.location.href='evidence.html?v=23000'">
        <div class="card-icon">🔒</div>
        <span>Evidence<br />Organizer</span>
        <small>Index proof. Tag doctrine. Build leverage.</small>
        <b>→</b>
      </button>

      <button class="dash-card" onclick="alert('Case Timeline coming next.')">
        <div class="card-icon">⏳</div>
        <span>Case<br />Timeline</span>
        <small>Every event matters.</small>
        <b>→</b>
      </button>

      <button class="dash-card" onclick="alert('Export Dossier coming next.')">
        <div class="card-icon">📜</div>
        <span>Export<br />Dossier</span>
        <small>Build. Export. Defend.</small>
        <b>→</b>
      </button>
    </section>

    <footer class="dash-footer">
      <button onclick="alert('User coming next.')">User</button>
      <p>Leave a record that cannot be ignored.</p>
      <button onclick="logoutUser()">Logout</button>
    </footer>
  </main>

  <script>
    function logoutUser() {
      localStorage.setItem("vindex_logged_in", "false");
      window.location.href = "index.html?v=23000";
    }
  </script>

</html>
