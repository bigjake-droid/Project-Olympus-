<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Vindex Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="vindex-screen dashboard-screen">
    <div class="dark-overlay"></div>

    <section class="form-panel active-panel">
      <h2>Project Vindex</h2>
      <p>Your record begins here.</p>

      <button class="primary-btn" onclick="openSection('Pro Se Guidebook')">
        Pro Se Guidebook
      </button>

      <button class="secondary-btn" onclick="openSection('Evidence Organizer')">
        Evidence Organizer
      </button>

      <button class="secondary-btn" onclick="openSection('Case Timeline')">
        Case Timeline
      </button>

      <button class="secondary-btn" onclick="openSection('Export Dossier')">
        Export Dossier
      </button>

      <button class="text-btn" onclick="logoutUser()">
        Logout
      </button>
    </section>

    <div id="messageBox" class="message-box"></div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const loggedIn = localStorage.getItem("vindex_logged_in");

      if (loggedIn !== "true") {
        window.location.href = "index.html";
      }
    });

    function openSection(sectionName) {
      const messageBox = document.getElementById("messageBox");

      messageBox.textContent = sectionName + " coming next.";
      messageBox.classList.add("show");

      setTimeout(function () {
        messageBox.classList.remove("show");
      }, 2000);
    }

    function logoutUser() {
      localStorage.setItem("vindex_logged_in", "false");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
