<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Vindex Dashboard</title>

  <link rel="stylesheet" href="./style.css?v=99" />
</head>

<body>
  <main class="dash-page">
    <div class="dash-overlay"></div>

    <section class="dash-content">
      <header class="dash-header">
        <h1>Project Vindex</h1>
        <p>Vox Dei</p>
      </header>

      <section class="dash-welcome">
        <h2>Welcome Back</h2>
        <p>Your record. Your cause. Your voice.</p>
      </section>

      <section class="dash-grid">
        <button class="dash-card" onclick="openSection('Pro Se Guidebook')">
          <span>Pro Se Guidebook</span>
          <small>Knowledge is your weapon.</small>
        </button>

        <button class="dash-card" onclick="openSection('Evidence Organizer')">
          <span>Evidence Organizer</span>
          <small>Organize. Secure. Prepare.</small>
        </button>

        <button class="dash-card" onclick="openSection('Case Timeline')">
          <span>Case Timeline</span>
          <small>Every event matters.</small>
        </button>

        <button class="dash-card" onclick="openSection('Export Dossier')">
          <span>Export Dossier</span>
          <small>Build. Export. Defend.</small>
        </button>
      </section>

      <button class="dash-logout" onclick="logoutUser()">Logout</button>
    </section>

    <div id="messageBox" class="message-box"></div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const loggedIn = localStorage.getItem("vindex_logged_in");

      if (loggedIn !== "true") {
        window.location.href = "index.html";
      }
    });

    function openSection(sectionName) {
      const messageBox = document.getElementById("messageBox");

      messageBox.textContent = sectionName + " coming next.";
      messageBox.classList.add("show");

      setTimeout(function () {
        messageBox.classList.remove("show");
      }, 1800);
    }

    function logoutUser() {
      localStorage.setItem("vindex_logged_in", "false");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
