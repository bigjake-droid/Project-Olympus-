<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Vindex</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="dashboard">

  <div class="overlay"></div>

  <section class="header">
    <h1>PROJECT VINDEX</h1>
    <p>Vox Dei</p>
  </section>

  <section class="welcome">
    <h2>Welcome Back</h2>
    <p>Your record. Your cause. Your voice.</p>
  </section>

  <section class="grid">

    <div class="card" onclick="openSection('Guidebook')">
      <h3>Pro Se Guidebook</h3>
      <p>Knowledge is your weapon</p>
    </div>

    <div class="card" onclick="openSection('Evidence')">
      <h3>Evidence Organizer</h3>
      <p>Organize. Secure. Prepare.</p>
    </div>

    <div class="card" onclick="openSection('Timeline')">
      <h3>Case Timeline</h3>
      <p>Every event matters</p>
    </div>

    <div class="card" onclick="openSection('Export')">
      <h3>Export Dossier</h3>
      <p>Build. Export. Defend.</p>
    </div>

  </section>

  <button class="logout" onclick="logout()">Logout</button>

</main>

<script>
function openSection(name) {
  alert(name + " coming next");
}

function logout() {
  localStorage.setItem("vindex_logged_in", "false");
  window.location.href = "index.html";
}
</script>

</body>
</html>
