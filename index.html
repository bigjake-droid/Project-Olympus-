<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project Vindex</title>

  <link rel="stylesheet" href="./style.css?v=2000" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>
  <main class="vindex-screen">
    <div class="dark-overlay"></div>

    <section id="splashPanel" class="entry-panel active-panel">
      <button id="createBtn" class="primary-btn">Create Account</button>
      <button id="loginBtn" class="secondary-btn">Login</button>
    </section>

    <section id="createPanel" class="form-panel hidden-panel">
      <h2>Create Account</h2>
      <p>Establish your record.</p>

      <input id="fullName" type="text" placeholder="Full Name" />
      <input id="createEmail" type="email" placeholder="Email Address" />
      <input id="createPassword" type="password" placeholder="Create Password" />
      <input id="confirmPassword" type="password" placeholder="Confirm Password" />

      <button id="submitCreateBtn" class="primary-btn">Enter Vindex</button>
      <button id="backFromCreateBtn" class="text-btn">Back</button>
    </section>

    <section id="loginPanel" class="form-panel hidden-panel">
      <h2>Login</h2>
      <p>Return to your record.</p>

      <input id="loginEmail" type="email" placeholder="Email Address" />
      <input id="loginPassword" type="password" placeholder="Password" />

      <button id="submitLoginBtn" class="primary-btn">Access Record</button>
      <button id="backFromLoginBtn" class="text-btn">Back</button>
    </section>

    <div id="messageBox" class="message-box"></div>
  </main>

  <script src="./script.js?v=2000"></script>
</body>
</html>
