<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Vindex</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="vindex-screen">

    <div class="overlay"></div>

    <section class="content">
      <div class="top-spacer"></div>

      <div class="button-panel">
        <button onclick="showCreate()" class="main-btn">Create Account</button>
        <button onclick="showLogin()" class="secondary-btn">Login</button>
      </div>

      <form id="createForm" class="form hidden">
        <input type="text" id="fullName" placeholder="Full Name" />
        <input type="email" id="email" placeholder="Email Address" />
        <input type="password" id="password" placeholder="Create Password" />
        <input type="password" id="confirmPassword" placeholder="Confirm Password" />
        <button type="button" onclick="createAccount()" class="main-btn">Enter Record</button>
      </form>

      <form id="loginForm" class="form hidden">
        <input type="email" id="loginEmail" placeholder="Email Address" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button type="button" onclick="loginUser()" class="main-btn">Access Record</button>
      </form>

      <p id="message"></p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
