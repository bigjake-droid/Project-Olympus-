<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Vindex Technologies</title>

<link rel="stylesheet" href="style.css?v=4000">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="vindex-screen">

<div class="dark-overlay"></div>

<!-- SMOKE INTRO -->
<div id="intro" class="intro">
  <img src="vindex-logo.png" class="intro-logo">
  <h1 class="intro-title">Project Vindex Technologies</h1>
</div>

<!-- MAIN LOGIN -->
<div id="mainUI" class="entry-panel hidden-panel">

  <h1 class="main-title">PROJECT VINDEX</h1>
  <p class="main-sub">Establish your record.</p>

  <input type="text" id="loginEmail" placeholder="Email Address">
  <input type="password" id="loginPassword" placeholder="Password">

  <button class="primary-btn" id="submitLoginBtn">Access Record</button>

  <button class="secondary-btn" id="createBtn">Create Account</button>

</div>

<script src="script.js?v=4000"></script>
</body>
</html>
